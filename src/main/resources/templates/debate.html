<!DOCTYPE html>
<html>
<head>
    <title>Debate AI</title>
    <link rel="stylesheet" th:href="@{/css/Debate.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="header">
    <h2 id="modeTitle">Debate Mode</h2>
    <a href="/dashboard" class="back-btn">← Back</a>
</div>

<div class="container">

    <h1>Start Your Debate</h1>

    <h2 id="topicTitle">Topic: Loading...</h2>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-section">
        <button onclick="startVoiceRecognition()" id="micBtn" class="icon-btn" title="Speak Argument">🎤</button>
        <textarea id="argument" placeholder="Type or speak your argument and press Enter..."></textarea>
        <button onclick="sendArgument()">Send</button>
        <button onclick="endDebate()" class="end-btn">End Debate</button>
        <button onclick="toggleVoice()" id="voiceToggleBtn" class="icon-btn voice-toggle" title="AI Voice On">🔊</button>
    </div>

</div>

<!-- 🏆 RESULT AT BOTTOM -->
<div id="resultBox" class="result-bottom"></div>

<script>

const params = new URLSearchParams(window.location.search);
let topic = params.get("topic");
let mode = params.get("mode");
let stance = params.get("stance") || "for";

let lastUserArg = "";
let lastAiArg = "";
let debateEnded = false;

// SET TOPIC
if(topic){
    let stanceText = stance === "for" ? "(In Motion)" : "(Against Motion)";
    document.getElementById("topicTitle").innerText = `Topic: ${topic} ${stanceText}`;
}else{
    topic = "General Debate";
    document.getElementById("topicTitle").innerText = "Topic: General Debate";
}

// SET MODE
if(mode === "human"){
    document.getElementById("modeTitle").innerText = "Human Debate 👥";
}else{
    document.getElementById("modeTitle").innerText = "AI Debate 🤖";
}

// Handle Enter to submit
document.getElementById("argument").addEventListener("keypress", function(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendArgument();
    }
});

// SEND
function sendArgument() {

    if(debateEnded){
        alert("Debate already ended!");
        return;
    }

    let argumentInput = document.getElementById("argument");
    let userText = argumentInput.value;
    let chatBox = document.getElementById("chatBox");

    if(userText.trim() === ""){
        return;
    }

    lastUserArg = userText;
    chatBox.innerHTML += `<div class="msg user">You: ${userText}</div>`;
    argumentInput.value = "";
    
    // Auto resize
    chatBox.scrollTop = chatBox.scrollHeight;

    if(mode === "human"){
        chatBox.innerHTML += `<div class="msg opponent">Opponent: ${userText}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        return;
    }

    // Loading indicator
    let loadingId = "loading-" + Date.now();
    chatBox.innerHTML += `<div id="${loadingId}" class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/debate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({argument: userText, topic: topic, stance: stance})
    })
    .then(res => res.text())
    .then(data => {
        // Remove loading
        document.getElementById(loadingId).remove();
        
        lastAiArg = data;
        chatBox.innerHTML += `<div class="msg ai">AI: ${data}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Speak response
        speakText(data);
    })
    .catch(err => {
        document.getElementById(loadingId).remove();
        chatBox.innerHTML += `<div class="msg ai">AI: Error communicating with server.</div>`;
    });
}

// END DEBATE
function endDebate() {

    if(debateEnded){
        alert("Debate already ended!");
        return;
    }

    if(!lastUserArg || !lastAiArg){
        alert("Complete at least one round!");
        return;
    }

    debateEnded = true;

    let winner = "";
    let reason = "";

    if(lastUserArg.length > lastAiArg.length){
        winner = "You 🥇";
        reason = "Your argument was longer and more detailed.";
    } else {
        winner = "AI 🤖";
        reason = "AI argument was longer and more detailed.";
    }

    const resultBox = document.getElementById("resultBox");

    resultBox.innerHTML = `
        <div class="result-card">
            <h2>🏆 Winner: ${winner}</h2>
            <p><b>Reason:</b> ${reason}</p>
        </div>
    `;

    resultBox.classList.add("show");
    resultBox.scrollIntoView({ behavior: "smooth" });

    // 🔥 SAVE RESULT LOCALLY (FOR DASHBOARD)
    localStorage.setItem("lastWinner", winner);
    localStorage.setItem("lastReason", reason);
    localStorage.setItem("lastTopic", topic);

    saveDebate();
}

// SAVE
function saveDebate() {
    const username = localStorage.getItem("username") || "Guest";

    fetch("/saveDebate", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `username=${username}&topic=${topic}&userArgument=${lastUserArg}&aiArgument=${lastAiArg}`
    });
}

// --- VOICE INTEGRATION ---
let voiceEnabled = true;

function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById("voiceToggleBtn");
    if(voiceEnabled) {
        btn.innerText = "🔊";
        btn.title = "AI Voice On";
        btn.classList.remove("off");
    } else {
        btn.innerText = "🔈";
        btn.title = "AI Voice Off";
        btn.classList.add("off");
        window.speechSynthesis.cancel();
    }
}

function speakText(text) {
    if(!voiceEnabled) return;
    
    // Clean text: remove asterisks or markdown
    let cleanText = text.replace(/[\*\_]/g, "");
    
    let utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'en-US';
    utterance.rate = 1.0;
    
    window.speechSynthesis.speak(utterance);
}

// Voice Recognition (Speech-to-Text)
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = 'en-US';

    recognition.onstart = function() {
        document.getElementById("micBtn").classList.add("recording");
        document.getElementById("micBtn").innerText = "🔴";
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        const argInput = document.getElementById("argument");
        argInput.value += (argInput.value ? " " : "") + transcript;
    };

    recognition.onerror = function(event) {
        console.error("Speech recognition error", event.error);
        document.getElementById("micBtn").classList.remove("recording");
        document.getElementById("micBtn").innerText = "🎤";
    };

    recognition.onend = function() {
        document.getElementById("micBtn").classList.remove("recording");
        document.getElementById("micBtn").innerText = "🎤";
    };
} else {
    console.warn("Speech Recognition API not supported in this browser.");
}

function startVoiceRecognition() {
    if (recognition) {
        recognition.start();
    } else {
        alert("Your browser does not support Speech Recognition. Please use Chrome or Edge.");
    }
}

</script>

</body>
</html>
