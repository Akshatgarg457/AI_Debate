<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sign Up</title>

<link rel="stylesheet" th:href="@{/css/styles.css}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="box">
<div class="signup">
<div class="signupBx">

<h2>
<i class="fa-solid fa-user-plus"></i>
SIGN UP
</h2>

<!-- Messages -->
<p style="color:red;">
<script>
if(window.location.search.includes("error=password")){
    document.write("Passwords do not match");
}
if(window.location.search.includes("error=username")){
    document.write("Username already exists");
}
if(window.location.search.includes("error=email")){
    document.write("Email already exists");
}
</script>
</p>

<form action="/signup" method="post">

<input type="text" name="fullName" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirmPassword" placeholder="Confirm Password" required>

<!-- ✅ YOUR CUSTOM SECURITY QUESTIONS (KEPT SAME) -->
<select name="securityQ" required>
    <option value="">Select Security Question</option>
    <option value="anime">Your School Name</option>
    <option value="superhero">Your Favorite Superhero</option>
    <option value="cricketer">Your Favorite Cricketer</option>
    <option value="lucky">Your Lucky Number</option>
    <option value="nickname">Your Childhood Nickname</option>
</select>

<input type="text" name="answer" placeholder="Your Answer" required>

<input type="submit" value="Create Account">

</form>

<div class="group">
<a href="/login">Already have account?</a>
<a href="/login">Login</a>
</div>

</div>
</div>
</div>

</body>
</html>
