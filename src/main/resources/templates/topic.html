<!DOCTYPE html>
<html>
<head>
    <title>Select Topic</title>
    <link rel="stylesheet" th:href="@{/css/topic.css}">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>🎯 Select Debate Topic</h2>
    <a href="/dashboard" class="back-btn">← Back</a>
</div>

<div class="container">

    <h1 class="title">Choose a Topic</h1>

    <!-- TOPIC GRID -->
    <div class="topic-container">

        <div class="topic-card" onclick="selectTopic(this)">Social media is harmful</div>
        <div class="topic-card" onclick="selectTopic(this)">Online education vs offline</div>
        <div class="topic-card" onclick="selectTopic(this)">AI will replace jobs</div>
        <div class="topic-card" onclick="selectTopic(this)">Technology improves life</div>
        <div class="topic-card" onclick="selectTopic(this)">Gaming is beneficial</div>
        <div class="topic-card" onclick="selectTopic(this)">Climate change is real</div>

    </div>

    <!-- CUSTOM TOPIC -->
    <div class="custom-section">
        <input type="text" id="customTopic" placeholder="Or enter your own topic...">
    </div>

    <!-- START BUTTONS -->
    <div class="action-buttons" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
        <button class="start-btn" style="background: #27ae60;" onclick="startDebate('for')">In Motion (For) 👍</button>
        <button class="start-btn" style="background: #e74c3c;" onclick="startDebate('against')">Against Motion 👎</button>
    </div>

</div>

<script>

let selectedTopic = "";

// SELECT FROM CARDS
function selectTopic(element){

    document.querySelectorAll(".topic-card").forEach(card => {
        card.classList.remove("active");
    });

    element.classList.add("active");
    selectedTopic = element.innerText;
}

// START DEBATE
function startDebate(stance){

    const custom = document.getElementById("customTopic").value;

    if(custom.trim() !== ""){
        selectedTopic = custom;
    }

    if(selectedTopic === ""){
        alert("Please select or enter a topic!");
        return;
    }

    // GET MODE FROM URL
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") || "ai";

    window.location.href = `/debate?topic=${encodeURIComponent(selectedTopic)}&mode=${mode}&stance=${stance}`;
}

</script>

</body>
</html>
