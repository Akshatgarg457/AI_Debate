<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Forgot Password</title>

<link rel="stylesheet" th:href="@{/css/forget.css}">

</head>

<body>

<div class="box">
<div class="login">
<div class="loginBx">

<h2>FORGOT PASSWORD</h2>

<!-- STEP 1 -->
<input type="text" id="username" placeholder="Enter Username">
<input type="button" value="Search" onclick="searchUser()">

<!-- STEP 2 -->
<input type="text" id="question" placeholder="Security Question" readonly style="display:none;">
<input type="text" id="answer" placeholder="Answer" style="display:none;">
<input type="button" id="verifyBtn" value="Verify" onclick="verifyAnswer()" style="display:none;">

<!-- STEP 3 -->
<form action="/reset-password" method="post" id="resetForm" style="display:none;">

<input type="hidden" name="username" id="hiddenUsername">
<input type="hidden" name="securityQ" id="hiddenQ">
<input type="hidden" name="answer" id="hiddenAnswer">

<input type="password" name="newPassword" placeholder="New Password" required>
<input type="password" name="confirmPassword" placeholder="Confirm Password" required>

<input type="submit" value="Reset Password">

</form>

<div class="group">
<a href="/login">Back to Login</a>
</div>

</div>
</div>
</div>

<script>

const questions = {
    anime: "Your School Name",
    superhero: "Your Favorite Superhero",
    cricketer: "Your Favorite Cricketer",
    lucky: "Your Lucky Number",
    nickname: "Your Childhood Nickname"
};

let currentUser = "";
let currentQuestion = "";

// STEP 1
function searchUser(){

    let user = document.getElementById("username").value;

    if(user === ""){
        alert("Enter username");
        return;
    }

    fetch("/get-question?username=" + user)
    .then(res => res.text())
    .then(data => {
        let key = data.trim();

        if(key === "NOT_FOUND"){
            alert("User not found");
            return;
        }

        currentUser = user;
        currentQuestion = key;

        document.getElementById("question").style.display = "block";
        document.getElementById("answer").style.display = "block";
        document.getElementById("verifyBtn").style.display = "block";

        document.getElementById("question").value = questions[key] || key;
    });
}

// STEP 2
function verifyAnswer(){

    let answer = document.getElementById("answer").value;

    if(answer === ""){
        alert("Enter answer");
        return;
    }

    document.getElementById("resetForm").style.display = "block";

    document.getElementById("hiddenUsername").value = currentUser;
    document.getElementById("hiddenQ").value = currentQuestion;
    document.getElementById("hiddenAnswer").value = answer;
}

</script>

</body>
</html>
